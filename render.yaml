services:
  # The FastAPI Web Service
  - type: web
    name: library-management-api
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString

  # The PostgreSQL Database
  - type: db
    name: library-db
    plan: free
    ipAllowList: [] # Only allow internal connections by default
